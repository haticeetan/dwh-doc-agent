[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Gerçek Oracle + OpenAI bağlantısı gerektiren testleri varsayılan çalışmadan hariç tut.
# Bunları çalıştırmak için: pytest -m integration
addopts = -m "not integration" -v
markers =
    integration: Oracle ve OpenAI bağlantısı gerektiren uçtan uca testler
